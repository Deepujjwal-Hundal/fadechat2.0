<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FadeChat | Secure Ephemeral Messaging</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Unbounded:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#050505',
            surface: '#111111',
            surface_elevated: '#1A1A1A',
            primary: '#00F0FF',
            secondary: '#FF00FF',
            accent: '#00FF66',
            danger: '#FF3333',
            warning: '#FFD700',
            text_primary: '#FFFFFF',
            text_secondary: '#A0A0A0',
            text_muted: '#555555',
            border: '#222222',
            neon: {
              blue: '#00F0FF',
              purple: '#FF00FF',
              green: '#00FF66',
              dark: '#050505',
              panel: '#111111',
            }
          },
          fontFamily: {
            heading: ['Unbounded', 'sans-serif'],
            body: ['IBM Plex Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'spin-slow': 'spin 8s linear infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(0, 240, 255, 0.3)' },
              '50%': { boxShadow: '0 0 40px rgba(0, 240, 255, 0.6)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }
    
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #050505;
      color: #FFFFFF;
      font-family: 'IBM Plex Sans', sans-serif;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      overflow-x: hidden;
    }

    input, textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111111;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #00F0FF;
    }

    /* Noise overlay for screenshot protection */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Glowing text effect */
    .glow-text {
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
    }

    /* Neon border glow */
    .neon-border {
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.1);
    }

    /* Scanlines effect */
    .scanlines::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1),
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Safe area for mobile */
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
  </style>
  <script type="module" src="/index.tsx"></script>
</head>
<body>
  <div id="root"></div>
  <div class="noise-overlay"></div>
</body>
</html>
